packages:
  - .
  - haskell-debugger-view

configure-options:
  $targets:
    - --enable-executable-dynamic
    - --disable-library-vanilla

ghc-options:
  $targets: -finfo-table-map

# There's no Stackage snapshot for GHC 9.14.1 yet, so go via compiler version.
# SEE: https://docs.haskellstack.org/en/stable/topics/snapshot_location/
snapshot: ghc-9.14.1

